<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Carga OLT</title>
    <!-- Tailwind CSS para diseño moderno -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SheetJS para procesamiento de Excel en cliente -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <!-- SweetAlert2 para diálogos interactivos -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Lucide Icons para iconografía -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .loader { border-top-color: #3b82f6; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden-view { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900">

    <!-- Pantalla de Acceso -->
    <div id="view-login" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-100">
            <div class="flex justify-center mb-6 text-blue-600">
                <i data-lucide="shield-check" class="w-12 h-12"></i>
            </div>
            <h2 class="text-2xl font-bold text-center mb-8">Acceso OLT</h2>
            <div class="space-y-4">
                <input type="text" id="dni" class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 transition-all" placeholder="DNI" onkeydown="if(event.key==='Enter') handleLogin()">
                <input type="password" id="password" class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 transition-all" placeholder="Contraseña" onkeydown="if(event.key==='Enter') handleLogin()">
                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl shadow-lg hover:bg-blue-700 transform active:scale-95 transition-all">Ingresar</button>
            </div>
        </div>
    </div>

    <!-- Pantalla Principal -->
    <div id="view-main" class="hidden-view max-w-5xl mx-auto px-4 py-8">
        <header class="flex justify-between items-center mb-8 bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
            <div class="flex items-center space-x-4">
                <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold" id="u-avatar">?</div>
                <div>
                    <h1 class="font-bold text-slate-800" id="u-name">Cargando...</h1>
                    <p class="text-xs text-slate-500">Operador Logístico</p>
                </div>
            </div>
            <button onclick="logout()" class="p-2 text-slate-400 hover:text-red-500 transition-colors">
                <i data-lucide="log-out"></i>
            </button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Columna Izquierda: Carga -->
            <div class="md:col-span-1 space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <h3 class="font-bold text-slate-700 mb-4 flex items-center">
                        <i data-lucide="upload-cloud" class="mr-2 text-blue-500"></i>
                        Cargar Archivo
                    </h3>
                    <div id="drop-area" class="border-2 border-dashed border-slate-200 rounded-xl p-6 text-center hover:border-blue-400 cursor-pointer bg-slate-50 transition-all group">
                        <input type="file" id="file-input" class="hidden" accept=".xlsx, .xls">
                        <i data-lucide="file-up" class="w-10 h-10 mx-auto mb-2 text-slate-400 group-hover:text-blue-500 transition-colors"></i>
                        <p class="text-sm font-medium text-slate-600">Click para seleccionar archivo</p>
                    </div>
                </div>
            </div>

            <!-- Columna Derecha: Estado -->
            <div class="md:col-span-2">
                <div id="status-panel" class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100 min-h-[400px] flex flex-col items-center justify-center text-center">
                    
                    <!-- Estado 1: Inicial -->
                    <div id="initial-msg">
                        <i data-lucide="database" class="w-16 h-16 text-slate-200 mx-auto mb-4"></i>
                        <h3 class="text-xl font-bold text-slate-400">Esperando archivo de programación...</h3>
                        <p class="text-slate-400 mt-2">Sube un Excel con 20 columnas</p>
                    </div>

                    <!-- Estado 2: Procesando -->
                    <div id="processing-msg" class="hidden-view">
                        <div class="loader rounded-full border-4 border-t-4 border-slate-200 h-12 w-12 mb-4 mx-auto"></div>
                        <h3 class="font-bold text-blue-600 text-lg">Procesando registros...</h3>
                    </div>

                    <!-- Estado 3: Resultado -->
                    <div id="result-msg" class="hidden-view w-full">
                        <div class="bg-green-50 text-green-700 p-3 rounded-lg mb-6 text-sm font-bold border border-green-200 inline-flex items-center">
                            <i data-lucide="check-circle" class="w-4 h-4 mr-2"></i> Estructura validada correctamente
                        </div>

                        <div class="grid grid-cols-2 gap-4 mb-6">
                            <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                <span class="block text-3xl font-black text-slate-700" id="st-total">0</span>
                                <span class="text-[10px] text-slate-400 uppercase tracking-widest font-bold">Líneas Leídas</span>
                            </div>
                            <div class="bg-amber-50 p-4 rounded-xl border border-amber-100">
                                <span class="block text-3xl font-black text-amber-600" id="st-dupes">0</span>
                                <span class="text-[10px] text-amber-500 uppercase tracking-widest font-bold">Duplicados Omitibles</span>
                            </div>
                        </div>

                        <div class="space-y-4">
                            <label class="flex items-center justify-center p-4 bg-slate-50 rounded-xl cursor-pointer hover:bg-slate-100 transition-all border border-slate-200">
                                <input type="checkbox" id="omit-dupes" checked class="w-5 h-5 text-blue-600 rounded">
                                <span class="ml-3 text-sm font-semibold text-slate-700">Limpiar registros duplicados automáticamente</span>
                            </label>

                            <button onclick="uploadData()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-700 transform active:scale-95 transition-all text-lg flex items-center justify-center gap-2">
                                <i data-lucide="send" class="w-5 h-5"></i>
                                PROCESAR CARGA MASIVA
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxRR3vF__CXINtppeeMMR3coba_hIhLy_nK_6geHcPRpJhHakr-Ag70GEbQTK8fvre5/exec';
        const REQUIRED_COLS = ["Fec.Despacho", "Área de OLT", "Entrega", "Factura/B.V.", "GR", "Am - Pm", "Cita", "Razón Social del Cliente", "Distrito", "Provincia", "Departamento", "Línea", "Bultos", "Volumen", "Peso", "Tipo de despacho", "Tipo de Transporte", "Tipo de Mercaderia", "Observación", "Código del Transporte"];

        let appState = {
            user: null,
            originalData: [],
            cleanRowsOnly: [],
            dupeCount: 0
        };

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            const session = localStorage.getItem('olt_session');
            if (session) {
                appState.user = JSON.parse(session);
                showMain();
            }
            initDropZone();
        });

        async function handleLogin() {
    const dni = document.getElementById('dni').value;
    const password = document.getElementById('password').value;

    if (!dni || !password) {
        return Swal.fire('Atención', 'Por favor complete todos los campos', 'warning');
    }

    Swal.fire({
        title: 'Verificando...',
        allowOutsideClick: false,
        didOpen: () => Swal.showLoading()
    });

    try {
        const response = await fetch(WEB_APP_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: 'login',
                dni: dni,
                password: password
            })
        });

        const result = await response.json(); // Ahora sí podemos leer la respuesta

        if (result.status === "Success") {
            appState.user = { 
                dni: result.info.dni, 
                name: result.info.name 
            };
            localStorage.setItem('olt_session', JSON.stringify(appState.user));
            Swal.close();
            showMain();
        } else {
            Swal.fire('Error', result.info || 'Credenciales inválidas', 'error');
        }
    } catch (error) {
        Swal.fire('Error de Conexión', 'No se pudo contactar con el servidor de autenticación', 'error');
    }
}

        function showMain() {
            document.getElementById('view-login').classList.add('hidden-view');
            document.getElementById('view-main').classList.remove('hidden-view');
            document.getElementById('u-name').innerText = appState.user.name;
            document.getElementById('u-avatar').innerText = appState.user.name.charAt(0);
            lucide.createIcons();
        }

        function initDropZone() {
            const input = document.getElementById('file-input');
            const zone = document.getElementById('drop-area');
            zone.onclick = () => input.click();
            input.onchange = (e) => handleFile(e.target.files[0]);
        }

        function handleFile(file) {
            if (!file) return;
            toggleStatus('processing');

            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });

                if (!rows[0] || rows[0].length !== REQUIRED_COLS.length) {
                    Swal.fire('Formato Inválido', `El archivo debe tener exactamente ${REQUIRED_COLS.length} columnas.`, 'warning');
                    return toggleStatus('initial');
                }

                const dataRows = rows.slice(1).filter(r => r.join('').trim() !== "");
                const unique = [];
                const seen = new Set();

                dataRows.forEach(r => {
                    const key = `${r[0]}|${r[2]}|${r[4]}|${r[11]}|${r[16]}`;
                    if (!seen.has(key)) {
                        seen.add(key);
                        unique.push(r);
                    }
                });

                appState.originalData = dataRows;
                appState.cleanRowsOnly = unique;
                appState.dupeCount = dataRows.length - unique.length;

                document.getElementById('st-total').innerText = dataRows.length;
                document.getElementById('st-dupes').innerText = appState.dupeCount;
                toggleStatus('result');
                lucide.createIcons();
            };
            reader.readAsArrayBuffer(file);
        }

        async function uploadData() {
            const omit = document.getElementById('omit-dupes').checked;
            const dataToUpload = omit ? appState.cleanRowsOnly : appState.originalData;

            if (dataToUpload.length === 0) return Swal.fire('Sin datos', 'No hay registros válidos para subir', 'info');

            Swal.fire({
                title: 'Sincronizando con Google',
                text: 'Procesando registros en la base de datos...',
                allowOutsideClick: false,
                didOpen: () => Swal.showLoading()
            });

            // CORRECCIÓN: Estructura del paquete de envío
            const dataPacket = {
                action: 'upload',
                payload: dataToUpload,
                userName: appState.user.name // Trazabilidad de quién sube el archivo
            };

            try {
        const response = await fetch(WEB_APP_URL, {
            method: 'POST',
            body: JSON.stringify(dataPacket)
        });

        const result = await response.json();

        if (result.status === "Success") {
            // Generar el resumen visual (msg) que ya tenías...
            let msg = `<div class="text-left text-xs bg-slate-50 p-3 rounded border border-slate-200">`;
            // ... (resto de tu lógica de resumen de líneas y transporte) ... [cite: 61, 62, 63]

            Swal.fire({
                title: '¡Carga Finalizada!',
                html: `Se registraron exitosamente <b>${result.info.count}</b> líneas.<br><br>${msg}`,
                icon: 'success'
            }).then(() => {
                resetApp();
            });
        } else {
            Swal.fire('Error en Servidor', result.info, 'error');
        }
    } catch (error) {
        Swal.fire('Error de Red', 'El servidor no respondió correctamente.', 'error');
    }
        }

        function resetApp() {
            appState.originalData = [];
            appState.cleanRowsOnly = [];
            appState.dupeCount = 0;
            const input = document.getElementById('file-input');
            if (input) input.value = "";
            toggleStatus('initial');
            lucide.createIcons();
        }

        function toggleStatus(status) {
            ['initial-msg', 'processing-msg', 'result-msg'].forEach(id => {
                document.getElementById(id).classList.add('hidden-view');
            });
            const targetId = { initial: 'initial-msg', processing: 'processing-msg', result: 'result-msg' }[status];
            if (targetId) document.getElementById(targetId).classList.remove('hidden-view');
        }

        function logout() {
            localStorage.removeItem('olt_session');
            location.reload();
        }
    </script>
</body>
</html>
